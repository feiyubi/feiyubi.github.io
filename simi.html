<br>
我1989年<span id="我"></span>-生日12月06日(阴历)</p> 
<script>
// 获取当前日期
var today = new Date();
var year = today.getFullYear();
var month = today.getMonth() + 1;
var day = today.getDate();
// 计算生日
var birthYear = 1989;
var birthMonth = 12;
var birthDay = 06;
var age = year - birthYear;
if (month < birthMonth || (month == birthMonth && day < birthDay)) {
age--;
}
// 更新页面上的年龄
document.getElementById("我").innerHTML = "-" + age + "岁";

</script>

<script language="javascript" type="text/javascript"> 
var interval = 1000; 
function ShowCountDown1(year,month,day,divname) 
{ 
var now = new Date(); 
var endDate = new Date(year, month-1, day); 
var leftTime=endDate.getTime()-now.getTime(); 
var leftsecond = parseInt(leftTime/1000); 
//var day1=parseInt(leftsecond/(24*60*60*6)); 
var day1=Math.floor(leftsecond/(60*60*24)); 
var hour=Math.floor((leftsecond-day1*24*60*60)/3600); 
var minute=Math.floor((leftsecond-day1*24*60*60-hour*3600)/60); 
var second=Math.floor(leftsecond-day1*24*60*60-hour*3600-minute*60); 
var cc = document.getElementById(divname); 
cc.innerHTML = "📢:生日倒计时："+day1+"天"+hour+"小时"+minute+"分"+second+"秒"; 
} window.setInterval(function(){ShowCountDown1(2025,01,05,'我1');}, interval); 
</script>
<font color="#FFB6C1">
<div id="我1"></div> </font>
