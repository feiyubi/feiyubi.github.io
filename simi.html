我1989年<span id="我"></span>-生日12月06日(阴历)</p> 
<script>
// 获取当前日期
var today = new Date();
var year = today.getFullYear();
var month = today.getMonth() + 1;
var day = today.getDate();
// 计算生日
var birthYear = 1989;
var birthMonth = 12;
var birthDay = 06;
var age = year - birthYear;
if (month < birthMonth || (month == birthMonth && day < birthDay)) {
age--;
}
// 更新页面上的年龄
document.getElementById("我").innerHTML = "-" + age + "岁";

</script>
